<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐播放器 - 布局</title>
<style>
:root{
 --bg-gradient: linear-gradient(135deg,#2c1b54 0%,#1a1033 100%);
 --glass-main: rgba(255,255,255,0.06);
 --glass-item: rgba(255,255,255,0.08);
 --glass-border: rgba(255,255,255,0.15);
 --text-primary: #e8e8ff;
 --text-secondary: #b0a9d6;
 --accent: #a78bfa;
 --divider: rgba(255,255,255,0.2);
 --sidebar-width: 220px;
 --ctrl-height: 90px;
}
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 user-select: none;
 -webkit-tap-highlight-color: transparent;
}
html, body {
 width: 100%;
 height: 100%;
 overflow: hidden;
 position: fixed;
}
body{
 font-family:"Segoe UI",sans-serif;
 background: var(--bg-gradient);
 height: 100vh;
 width: 100vw;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 overflow: hidden;
 position: fixed;
 top:0;
 left:0;
 right:0;
 bottom:0;
}
#app {
 width: 100%;
 height: 100%;
 display: flex;
 align-items: center;
 justify-content: center;
}

.player-container{
 width: 100%;
 height: 100%;
 max-width: 1400px;
 max-height: 800px;
 background: var(--glass-main);
 backdrop-filter: blur(16px);
 -webkit-backdrop-filter: blur(16px);
 border: 1px solid var(--glass-border);
 border-radius: 18px;
 box-shadow: 0 8px 40px rgba(0,0,0,0.4);
 display: flex;
 flex-direction: column;
 overflow: hidden;
 position: relative;
}

.main-content{
 flex: 1;
 display: flex;
 padding: 21px;
 gap: 16px;
 overflow: hidden;
 position: relative;
 min-height: 0;
}

/* 左侧边栏 */
.sidebar{
 width: var(--sidebar-width);
 flex-shrink: 0;
 display: flex;
 flex-direction: column;
 height: 100%;
 overflow: hidden;
}
.sidebar-group{
 display: flex;
 flex-direction: column;
 gap: 6px;
 margin-bottom: 20px;
 overflow: hidden;
}
.group-title{
 font-size: 14px;
 color: var(--accent);
 margin-bottom: 8px;
 padding-left: 4px;
 flex-shrink:0;
}
.singer-list{
 max-height: 175px;
 overflow-y: auto;
 overflow-x: hidden;
 display: flex;
 flex-direction: column;
 gap: 4px;
}
.playlist-list{
 flex: 1;
 overflow-y: auto;
 overflow-x: hidden;
 display: flex;
 flex-direction: column;
 gap: 4px;
 min-height: 0;
}
::-webkit-scrollbar{width:4px;height:0;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px;}
.sidebar-item{
 padding: 8px 10px;
 border-radius: 8px;
 color: var(--text-secondary);
 cursor: pointer;
 transition: 0.2s;
 font-size: 14px;
 white-space: nowrap;
}
.sidebar-item:hover,.sidebar-item.active{
 background: var(--glass-item);
 color:#fff;
}

.divider{
 width:1px;
 background:var(--divider);
 align-self:stretch;
 margin:10px 0;
}

/* 中间区域 */
.center-wrap{
 flex:1;
 display:flex;
 align-items:center;
 justify-content:flex-start;
 padding-left: 90px;
 gap:90px;
 overflow:hidden;
 position: relative;
 min-width: 0;
}

/* 封面区 */
.cover-section{
 display:flex;
 flex-direction:column;
 align-items:flex-start;
 gap:16px;
 flex-shrink: 0;
}
.cover-box{
 width:320px;
 height:320px;
 border-radius:20px;
 overflow:hidden;
 border:2px solid var(--glass-border);
}
.cover-box img{
 width:100%;
 height:100%;
 object-fit:cover;
 display: block;
}

.song-info-row{
 width: 100%;
 display: flex;
 justify-content: space-between;
 align-items: center;
}
.song-text{
 display: flex;
 flex-direction: column;
 gap: 4px;
}
.song-text h2{
 font-size:22px;
 color:var(--text-primary);
}
.song-text p{
 font-size:15px;
 color:var(--text-secondary);
}
.like-btn{
 background:transparent;
 border:none;
 color:var(--text-secondary);
 font-size:36px;
 width: 36px;
 height: 36px;
 display: inline-flex;
 align-items: center;
 justify-content: center;
 cursor: pointer;
 transition: color 0.2s, transform 0.05s ease;
 line-height: 1;
 padding: 0;
 outline: none;
}
.like-btn.active{
 color:#ff6b9d;
}
.like-btn:active {
 transform: scale(0.98);
}

/* 歌词区 */
.lyrics-box{
 flex:1;
 max-width:450px;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 overflow: hidden;
 min-width: 0;
}
.lyrics-title{
 font-size:16px;
 color:var(--text-secondary);
 margin-bottom:16px;
 flex-shrink: 0;
}
.lyrics-list{
 overflow-y: auto;
 overflow-x: hidden;
 scroll-behavior: smooth;
 max-height: 380px;
 padding-right: 8px;
}
.lyrics-list p{
 padding:10px 0;
 color:var(--text-secondary);
 transition:0.3s;
 font-size:15px;
 cursor: default;
}
.lyrics-list p.active{
 color:#fff;
 font-weight:500;
 transform: scale(1.02);
 text-shadow: 0 0 3px rgba(255,255,255,0.3);
}

/* 底部控制栏 */
.ctrl-bar{
 height:var(--ctrl-height);
 flex-shrink:0;
 border-top:1px solid var(--glass-border);
 display:flex;
 align-items:center;
 padding:0 41px;
 gap:12px;
 background: rgba(0,0,0,0.1);
}
.left-group{
 display:flex;
 gap:16px;
 align-items:center;
}
.ctrl-btn{
 background:transparent;
 border:none;
 color:var(--text-secondary);
 font-size:20px;
 cursor:pointer;
 transition:0.2s;
 width: 32px;
 height: 32px;
 display: inline-flex;
 align-items: center;
 justify-content: center;
}
.ctrl-btn:hover{
 color:var(--text-primary);
}

.progress-area{
 flex:1;
 display:flex;
 flex-direction:column;
 gap:6px;
 align-items:center;
 min-width: 0;
}
.progress-bar{
 width:100%;
 height:6px;
 border-radius:3px;
 background:rgba(255,255,255,0.1);
 position:relative;
 cursor:pointer;
}
.progress-fill{
 position:absolute;
 left:0;
 top:0;
 height:100%;
 background:linear-gradient(90deg,#a78bfa,#60a5fa);
 border-radius:3px;
 pointer-events: none;
}
.time-text{
 font-size:13px;
 color:var(--text-secondary);
 user-select: none;
}

.play-control{
 display:flex;
 gap:16px;
 align-items:center;
 margin:0 16px;
}
.play-btn{
 background:rgba(255,255,255,0.1);
 border:none;
 color:var(--text-primary);
 font-size:25px;
 width: 54px;
 height: 54px;
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
 transition:0.2s;
}
.play-btn:hover{
 background:rgba(255,255,255,0.2);
 transform: scale(0.98);
}

.right-group{
 display:flex;
 gap:16px;
 align-items:center;
}
.small-btn{
 background:transparent;
 border:none;
 color:var(--text-secondary);
 font-size:18px;
 cursor:pointer;
 transition:0.2s;
 width: 32px;
 height: 32px;
 display: inline-flex;
 align-items: center;
 justify-content: center;
}
.small-btn:hover{
 color:var(--text-primary);
}
.quality-btn{
 background:rgba(255,255,255,0.1);
 color:var(--text-secondary);
 border:none;
 padding:6px 12px;
 border-radius:8px;
 font-size:14px;
 cursor:pointer;
 transition:0.2s;
}
.quality-btn:hover{
 background:rgba(255,255,255,0.2);
 color:#fff;
}

/* Modal弹窗 */
.modal-overlay {
 position: fixed;
 inset: 0;
 background: rgba(0,0,0,0.6);
 display: flex;
 align-items: center;
 justify-content: center;
 z-index: 2000;
}
.modal-card {
 background: rgba(36,36,62,0.95);
 backdrop-filter: blur(20px);
 border: 1px solid rgba(255,255,255,0.1);
 border-radius: 16px;
 padding: 24px;
 min-width: 300px;
 max-height: 60vh;
 overflow-y: auto;
}
.modal-card h3 {
 color: #fff;
 margin-bottom: 16px;
 font-size: 16px;
}
.modal-item {
 padding: 10px 12px;
 border-radius: 8px;
 color: var(--text-secondary);
 cursor: pointer;
 transition: 0.2s;
}
.modal-item:hover { background: var(--glass-item); color: #fff; }
.modal-close {
 margin-top: 16px;
 width: 100%;
 padding: 8px;
 background: rgba(255,255,255,0.06);
 border: 1px solid rgba(255,255,255,0.1);
 border-radius: 8px;
 color: #aaa;
 cursor: pointer;
}
.modal-close:hover { background: rgba(122,154,255,0.15); color: #7a9aff; }
</style>
</head>
<body>
<div id="app">
  <div class="player-container">
    <div class="main-content">

      <!-- 左侧歌手/歌单列表 -->
      <div class="sidebar">
        <div class="sidebar-group">
          <div class="group-title">歌手</div>
          <div class="singer-list">
            <div class="sidebar-item active">歌手名1</div>
            <div class="sidebar-item">歌手名2</div>
            <div class="sidebar-item">歌手名3</div>
          </div>
        </div>
        <div class="sidebar-group">
          <div class="group-title">我的歌单</div>
          <div class="playlist-list">
            <div class="sidebar-item">歌单1</div>
            <div class="sidebar-item active">歌单2</div>
            <div class="sidebar-item">歌单3</div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- 中间：封面 + 歌词 -->
      <div class="center-wrap">
        <div class="cover-section">
          <div class="cover-box">
            <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='100' height='100'><circle cx='12' cy='12' r='10' fill='%23302b63'/><path d='M12 8.5c-1.93 0-3.5 1.57-3.5 3.5s1.57 3.5 3.5 3.5 3.5-1.57 3.5-3.5S13.93 8.5 12 8.5z' fill='%237a9aff'/></svg>" alt="封面占位">
          </div>
          <div class="song-info-row">
            <div class="song-text">
              <h2>歌曲名称</h2>
              <p>歌手名</p>
            </div>
            <button class="like-btn">♡</button>
          </div>
        </div>

        <div class="lyrics-box">
          <div class="lyrics-title">歌词</div>
          <div class="lyrics-list">
            <p>作词：无名</p>
            <p>作曲：无名</p>
            <p class="active">第一句歌词示例</p>
            <p>第二句歌词示例</p>
            <p>第三句歌词示例</p>
            <p>第四句歌词示例</p>
            <p>—</p>
            <p>副歌部分歌词</p>
            <p>副歌重复第二句</p>
            <p>副歌重复第三句</p>
            <p>副歌重复第四句</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部控制栏 -->
    <div class="ctrl-bar">
      <div class="left-group">
        <button class="ctrl-btn" title="添加到歌单">♪</button>
        <button class="ctrl-btn" title="播放列表">⋮</button>
      </div>

      <div class="progress-area">
        <div class="progress-bar">
          <div class="progress-fill" style="width:35%"></div>
        </div>
        <div class="time-text">01:23 / 04:15</div>
      </div>

      <div class="play-control">
        <button class="ctrl-btn">⏮</button>
        <button class="play-btn">▶</button>
        <button class="ctrl-btn">⏭</button>
      </div>

      <div class="right-group">
        <button class="quality-btn">词</button>
        <button class="small-btn">⟳</button>
        <button class="small-btn">🔊</button>
        <button class="small-btn">☰</button>
      </div>
    </div>
  </div>
</div>

<!-- Script: 仅用于交互演示（非数据请求） -->
<script>
// 点播按钮切换 播放/暂停 图标
document.querySelector('.play-btn')?.addEventListener('click', function() {
  this.textContent = this.textContent === '▶' ? '❚❚' : '▶';
});
// 喜欢按钮切换
document.querySelector('.like-btn')?.addEventListener('click', function() {
  this.classList.toggle('active');
  this.textContent = this.classList.contains('active') ? '♥' : '♡';
});
// 侧边栏选中效果
document.querySelectorAll('.sidebar-item').forEach(el => {
  el.addEventListener('click', function() {
    this.closest('.singer-list, .playlist-list')
      ?.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
</body>
</html>
